<!DOCTYPE html>
<html>

<body>

  <script>
    console.log('-- Literals and properties:');
    let user = {
      name: "John",
      age: 30
    };
    console.log(`name: ${user.name}, age: ${user.age}`);
    console.log(user['name']);

    user.isAdmin = true;
    delete user.age;

    // let fruit = prompt('Which fruit to buy?', 'apple');
    // let bag = {
    //   [fruit + 'Computers']: 5
    // }
    // console.log(bag);

    console.log('-- Property value shorthand:');
    function makeUser(name, age) {
      return {
        name,
        age: age,
      };
    }
    let user2 = makeUser('andersc', 30);
    console.log(`${user2.name}`);

    console.log('-- Property existence test:');
    console.log(`name: ${user2.name == undefined}`);
    console.log(`name: ${"score" in user2}`);

    console.log('-- For ... in:');
    // user2.isAdmin = false;
    user2['fav lang'] = 'python';
    for (const key in user2) {
      console.log(`key: ${key}, value: ${user2[key]}`);
    }

    console.log('-- Multiply numeric property values by 2:');
    function multiplyNumeric(obj) {
      for (let key in obj) {
        val = obj[key];
        if (typeof val == 'number') {
          val *= 2;
          obj[key] = val;
        }
      }
    }

    let menu = {
      width: 100,
      height: 110,
      title: 'my menu',
    };
    console.log(`title: ${menu.title}, width: ${menu.width}, height: ${menu.height}`);
    multiplyNumeric(menu);
    console.log(`title: ${menu.title}, width: ${menu.width}, height: ${menu.height}`);

    
  </script>

</body>

</html>
