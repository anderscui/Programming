    print('-- this in methods:');
    let user = {
      name: 'andersc',
      age: 30,

      sayHi() {
        print(this.name);
      }
    };

    user.sayHi();

    print('-- Create a calculator:');
    let calculator = {
      sum() {
        return this.a + this.b;
      },

      mul() {
        return this.a * this.b;
      },

      read() {
        this.a = +prompt('a?', 0);
        this.b = +prompt('b?', 0);
      }
    };

    calculator.read();
    print(`sum: ${calculator.sum()}`);
    print(`mul: ${calculator.mul()}`);

  </script>
