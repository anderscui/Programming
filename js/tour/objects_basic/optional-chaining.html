<!DOCTYPE html>
<html>

<body>
  <script src="../commons.js"></script>
  <script>
    print('-- Optional chaining:');
    let user = {
      name: 'andersc',
      address: null,
    };
    print(user.name);
    print(user?.address?.name);

    print('-- Other variants:');
    let userAdmin = {
      admin() {
        print('I am admin');
      }
    };
    let userGuest = {};

    userAdmin.admin?.();
    userGuest.admin?.();

  </script>

</body>

</html>
