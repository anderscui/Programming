<!DOCTYPE html>
<html>

<body>
  <script src="../commons.js"></script>
  <script>
    print('--- `class` syntax ---');
    class User {
      constructor(name) {
        this.name = name;
      }

      sayHi() {
        print(this.name);
      }
    }
    let user = new User('andersc');
    user.sayHi();

  </script>

</body>
