<!DOCTYPE html>
<html>

<body>

  <script>
    console.log('-- Maths:');
    console.log(`8 ** (1/3) = ${8 ** (1/3)}`);
    console.log(`9 ** (1/2) = ${9 ** (1/2)}`);

    console.log('-- String concat:');
    console.log(`1 + 2 + "3" = ${1 + 2 + "3"}`);
    console.log(`'6' / '2' = ${'6' / '2'}`);

    console.log('-- Numeric conversion, unary +:');

    let x = -1;
    console.log(`+(-1) = ${+x}`);
    console.log(`+true = ${+true}`);
    console.log(`+"" = ${+""}`);

    console.log('-- Assignment:');
    let a = 1, b = 2;
    console.log(`3 - (a = b + 1) = ${3 - (a = b + 1)}`);
  </script>

</body>

</html>
