<!DOCTYPE html>
<html>

<body>

  <script>
    console.log('-- Switch:');
    let a = 1 + 1;
    switch (a) {
      case 1:
        console.log('Too small');
        break;
      case 2:
        console.log('Exactly!');
        break;
      case 3:
        console.log('Too big');
        break;
      default:
        console.log('I do not know such values.')
        break;
    }
    
  </script>

</body>

</html>
