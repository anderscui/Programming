<!DOCTYPE html>
<html>

<body>
  <script src="../commons.js"></script>
  <script>
    print('--- Nested functions ---');
    function makeCounter() {
      let count = 0;

      return function() {
        return count++;
      }
    }
    let counter = makeCounter();
    print(counter());
    print(counter());
    print(counter());

  </script>

</body>

</html>
